name: customize-duniya-erp
region: blr

# ---------------------------------------------------------------------------
# HOW TO DEPLOY
#
# Option A — DigitalOcean dashboard (recommended):
#   1. Create a new App → choose "GitHub" as source → select your repo
#   2. In the "Edit Plan" step, paste this file into the App Spec editor
#   3. Set secrets when prompted: DATABASE_URL, SESSION_SECRET,
#      DO_SPACES_ACCESS_KEY_ID, DO_SPACES_SECRET_KEY
#
#   DATABASE_URL format:
#   postgresql://doadmin:<password>@<host>:25060/defaultdb?sslmode=require
#
# Option B — doctl CLI:
#   doctl apps create --spec .do/app.yaml
#   (Add `github.repo` and `github.branch` fields to each component first,
#    or connect the source via `doctl apps update` after creation.)
# ---------------------------------------------------------------------------

# NOTE: No managed database block here — the app uses an existing
# DigitalOcean managed PostgreSQL cluster set via DATABASE_URL secret.

# ---------------------------------------------------------------------------
# API Service  (Express 5, port 8080, routes /api/*)
# ---------------------------------------------------------------------------
services:
  - name: api
    source_dir: /
    build_command: >-
      corepack enable &&
      corepack prepare pnpm@10.26.1 --activate &&
      pnpm install --frozen-lockfile &&
      pnpm --filter @workspace/api-server run build
    run_command: node --enable-source-maps artifacts/api-server/dist/index.mjs
    http_port: 8080
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    health_check:
      http_path: /api/healthz
      initial_delay_seconds: 30
      period_seconds: 10
      timeout_seconds: 5
      failure_threshold: 3
    routes:
      - path: /api
    envs:
      - key: NODE_ENV
        value: production
        scope: RUN_AND_BUILD_TIME
      - key: PORT
        value: "8080"
        scope: RUN_AND_BUILD_TIME
      - key: DATABASE_URL
        value: ${db.DATABASE_URL}
        scope: RUN_TIME
      - key: SESSION_SECRET
        type: SECRET
        scope: RUN_TIME
      # DigitalOcean Spaces — set all three via the DO dashboard / doctl secrets
      - key: DO_SPACES_BUCKET
        value: czd
        scope: RUN_TIME
      - key: DO_SPACES_REGION
        value: blr1
        scope: RUN_TIME
      - key: DO_SPACES_ENDPOINT
        value: https://blr1.digitaloceanspaces.com
        scope: RUN_TIME
      - key: DO_SPACES_CDN_ENDPOINT
        value: https://czd.blr1.digitaloceanspaces.com
        scope: RUN_TIME
      - key: DO_SPACES_ACCESS_KEY_ID
        type: SECRET
        scope: RUN_TIME
      - key: DO_SPACES_SECRET_KEY
        type: SECRET
        scope: RUN_TIME

# ---------------------------------------------------------------------------
# Frontend — React + Vite static site, SPA routing via catchall
# ---------------------------------------------------------------------------
static_sites:
  - name: frontend
    source_dir: /
    build_command: >-
      corepack enable &&
      corepack prepare pnpm@10.26.1 --activate &&
      pnpm install --frozen-lockfile &&
      pnpm --filter @workspace/gifting-erp run build
    output_dir: artifacts/gifting-erp/dist/public
    catchall_document: index.html
    routes:
      - path: /
    envs:
      - key: NODE_ENV
        value: production
        scope: BUILD_TIME
      # BASE_PATH=/ because the frontend is served at the root
      - key: BASE_PATH
        value: /
        scope: BUILD_TIME
      # PORT is required by vite.config.ts at build time (not used at runtime for static sites)
      - key: PORT
        value: "3000"
        scope: BUILD_TIME

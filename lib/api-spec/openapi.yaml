                  $ref: "#/components/schemas/TopClient"

  # ── Companies ─────────────────────────────────────────────────────────────
  /v1/companies:
    get:
      operationId: listCompanies
      tags: [companies]
      summary: List companies the current user belongs to
      responses:
        "200":
          description: Company list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Company"
    post:
      operationId: createCompany
      tags: [companies]
      summary: Create a new company (Admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompanyInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"

  /v1/companies/{id}:
    patch:
      operationId: updateCompany
      tags: [companies]
      summary: Update company profile (Admin only)
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompanyUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"
    delete:
      operationId: deleteCompany
      tags: [companies]
      summary: Delete a company (Admin only)
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "204":
          description: Deleted

  /v1/companies/{id}/switch:
    post:
      operationId: switchCompany
      tags: [companies]
      summary: Switch active company context for the current session
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Switched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SwitchCompanyResult"
        "403":
          description: Not a member of this company

# ── Schemas ────────────────────────────────────────────────────────────────
components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    # ── Companies ──
    Company:
      type: object
      required: [id, name, createdAt, isCurrent]
      properties:
        id: { type: integer }
        name: { type: string }
        gstin: { type: ["string", "null"] }
        gstAddress: { type: ["string", "null"] }
        city: { type: ["string", "null"] }
        state: { type: ["string", "null"] }
        pincode: { type: ["string", "null"] }
        logoUrl: { type: ["string", "null"] }
        createdAt: { type: string }
        isCurrent: { type: boolean }

    CompanyInput:
      type: object
      required: [name]
      properties:
        name: { type: string }
        gstin: { type: string }
        gstAddress: { type: string }
        city: { type: string }
        state: { type: string }
        pincode: { type: string }
        logoUrl: { type: string }

    CompanyUpdate:
      type: object
      properties:
        name: { type: string }
        gstin: { type: string }
        gstAddress: { type: string }
        city: { type: string }
        state: { type: string }
        pincode: { type: string }
        logoUrl: { type: string }

    # ── Auth ──
    LoginInput:
      type: object
      required: [email, password]
      properties:
        email: { type: string }
        password: { type: string }

    AuthToken:
      type: object
      required: [token, user]
      properties:
        token: { type: string }
        user:
          $ref: "#/components/schemas/User"

    # ── Users ──
    User:
      type: object
      required: [id, name, email, role, createdAt]
      properties:
        id: { type: integer }
        name: { type: string }
        email: { type: string }
        role: { type: string }
        isActive: { type: boolean }
        createdAt: { type: string }

    UserInput:
      type: object
      required: [name, email, password, role]
      properties:
        name: { type: string }
        email: { type: string }
        password: { type: string }
        role: { type: string }

    UserUpdate:
      type: object
      properties:
        name: { type: string }
        email: { type: string }
        role: { type: string }
        isActive: { type: boolean }

    # ── Clients ──
    Client:
      type: object
      required: [id, companyName, contactPerson, email, createdAt]
      properties:
        id: { type: integer }
        companyName: { type: string }
        contactPerson: { type: string }
        email: { type: string }
        phone: { type: ["string", "null"] }
        gstNumber: { type: ["string", "null"] }
        industry: { type: ["string", "null"] }
        tags: { type: ["string", "null"] }
        billingAddress: { type: ["string", "null"] }
        shippingAddress: { type: ["string", "null"] }
        createdAt: { type: string }

    ClientInput:
      type: object
      required: [companyName, contactPerson, email]
      properties:
        companyName: { type: string }
        contactPerson: { type: string }
        email: { type: string }
        phone: { type: string }
        gstNumber: { type: string }
        industry: { type: string }
        tags: { type: string }
        billingAddress: { type: string }
        shippingAddress: { type: string }

    ClientUpdate:
      type: object
      properties:
        companyName: { type: string }
        contactPerson: { type: string }
        email: { type: string }
        phone: { type: string }
        gstNumber: { type: string }
        industry: { type: string }
        tags: { type: string }
        billingAddress: { type: string }
        shippingAddress: { type: string }

    ClientInteraction:
      type: object
      required: [id, clientId, type, notes, createdAt]
      properties:
        id: { type: integer }
        clientId: { type: integer }
        type: { type: string }
        notes: { type: string }
        createdAt: { type: string }

    ClientInteractionInput:
      type: object
      required: [type, notes]
      properties:
        type: { type: string }
        notes: { type: string }

    # ── Products ──
    Product:
      type: object
      required: [id, name, category, costPrice, sellingPrice, stockLevel, createdAt]
      properties:
        id: { type: integer }
        name: { type: string }
        category: { type: string }
        costPrice: { type: number }
        sellingPrice: { type: number }
        stockLevel: { type: integer }
        lowStockThreshold: { type: integer }
        vendorId: { type: ["integer", "null"] }
        vendorName: { type: ["string", "null"] }
        imageUrl: { type: ["string", "null"] }
        createdAt: { type: string }

    ProductInput:
      type: object
      required: [name, category, costPrice, sellingPrice]
      properties:
        name: { type: string }
        category: { type: string }
        costPrice: { type: number }
        sellingPrice: { type: number }
        stockLevel: { type: integer }
        lowStockThreshold: { type: integer }
        vendorId: { type: integer }
        imageUrl: { type: string }

    ProductUpdate:
      type: object
      properties:
        name: { type: string }
        category: { type: string }
        costPrice: { type: number }
        sellingPrice: { type: number }
        stockLevel: { type: integer }
        lowStockThreshold: { type: integer }
        vendorId: { type: integer }
        imageUrl: { type: string }

    # ── Bundles ──
    BundleItem:
      type: object
      required: [productId, productName, quantity, unitPrice]
      properties:
        productId: { type: integer }
        productName: { type: string }
        quantity: { type: integer }
        unitPrice: { type: number }

    Bundle:
      type: object
      required: [id, name, totalPrice, createdAt]
      properties:
        id: { type: integer }
        name: { type: string }
        description: { type: ["string", "null"] }
        occasion: { type: ["string", "null"] }
        totalPrice: { type: number }
        imageUrl: { type: ["string", "null"] }
        items: { type: array, items: { $ref: "#/components/schemas/BundleItem" } }
        createdAt: { type: string }

    BundleItemInput:
      type: object
      required: [productId, quantity]
      properties:
        productId: { type: integer }
        quantity: { type: integer }

    BundleInput:
      type: object
      required: [name, items]
      properties:
        name: { type: string }
        description: { type: string }
        occasion: { type: string }
        imageUrl: { type: string }
        items: { type: array, items: { $ref: "#/components/schemas/BundleItemInput" } }

    BundleUpdate:
      type: object
      properties:
        name: { type: string }
        description: { type: string }
        occasion: { type: string }
        imageUrl: { type: string }
        items: { type: array, items: { $ref: "#/components/schemas/BundleItemInput" } }

    BundleSuggestInput:
      type: object
      required: [budget, occasion]
      properties:
        budget: { type: number }
        occasion: { type: string }
        industry: { type: string }

    BundleSuggestion:
      type: object

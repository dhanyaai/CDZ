    InventoryMovementInput:
      type: object
      required: [productId, type, quantity]
      properties:
        productId: { type: integer }
        type: { type: string }
        quantity: { type: integer }
        batch: { type: string }
        reference: { type: string }

    InventoryByLocationItem:

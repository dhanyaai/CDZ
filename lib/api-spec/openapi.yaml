      responses:
        "200":
          description: Payments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Payment"
    post:
      operationId: createPayment
      tags: [payments]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"

  # ── Analytics ─────────────────────────────────────────────────────────────
  /v1/analytics/dashboard:
    get:
      operationId: getDashboardStats
      tags: [analytics]
      summary: Overall dashboard summary
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /v1/analytics/sales-pipeline:
    get:
      operationId: getSalesPipeline
      tags: [analytics]
      summary: Orders grouped by status
      responses:
        "200":
          description: Pipeline
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PipelineStage"

  /v1/analytics/inventory-status:
    get:
      operationId: getInventoryStatus
      tags: [analytics]
      summary: Inventory health overview
      responses:
        "200":
          description: Inventory status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryStatus"

  /v1/analytics/vendor-performance:
    get:
      operationId: getVendorPerformance
      tags: [analytics]
      summary: Vendor performance metrics
      responses:
        "200":
          description: Vendor metrics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VendorMetric"

  /v1/analytics/revenue-trend:
    get:
      operationId: getRevenueTrend
      tags: [analytics]
      summary: Monthly revenue trend
      parameters:
        - { name: months, in: query, schema: { type: integer, default: 6 } }
      responses:
        "200":
          description: Revenue trend
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RevenueTrendPoint"

  /v1/analytics/top-clients:
    get:
      operationId: getTopClients
      tags: [analytics]
      summary: Top clients by revenue
      responses:
        "200":
          description: Top clients
          content:
            application/json:
              schema:
                type: array

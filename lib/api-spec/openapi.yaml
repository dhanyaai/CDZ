        totalPrice: { type: number }
        margin: { type: number }

    # ── Vendors ──
    Vendor:
      type: object
      required: [id, name, createdAt]
      properties:
        id: { type: integer }
        name: { type: string }
        contactPerson: { type: ["string", "null"] }
        email: { type: ["string", "null"] }
        phone: { type: ["string", "null"] }
        leadTimeDays: { type: integer }
        createdAt: { type: string }

    VendorInput:
      type: object
      required: [name]
      properties:
        name: { type: string }
        contactPerson: { type: string }
        email: { type: string }
        phone: { type: string }
        leadTimeDays: { type: integer }

    VendorUpdate:
      type: object
      properties:
        name: { type: string }
        contactPerson: { type: string }
        email: { type: string }
        phone: { type: string }
        leadTimeDays: { type: integer }

    # ── Sales Orders ──
    SalesOrderItem:
      type: object
      required: [id, productId, productName, quantity, unitPrice, totalPrice]
      properties:
        id: { type: integer }
        productId: { type: integer }
        productName: { type: string }
        productImage: { type: ["string", "null"] }
        quantity: { type: integer }
        unitPrice: { type: number }
        totalPrice: { type: number }

    SalesOrderItemInput:
      type: object
      required: [productId, quantity, unitPrice]
      properties:
        productId: { type: integer }
        quantity: { type: integer }
        unitPrice: { type: number }

    DeliveryAddress:
      type: object
      required: [id, name, address]
      properties:
        id: { type: integer }
        name: { type: string }
        address: { type: string }
        city: { type: ["string", "null"] }
        pincode: { type: ["string", "null"] }
        phone: { type: ["string", "null"] }

    DeliveryAddressInput:
      type: object
      required: [name, address]
      properties:
        name: { type: string }
        address: { type: string }
        city: { type: string }
        pincode: { type: string }
        phone: { type: string }

    SalesOrder:
      type: object
      required: [id, orderNumber, clientId, clientName, status, totalAmount, discountPct, gstAmount, grandTotal, createdAt]
      properties:
        id: { type: integer }
        orderNumber: { type: string }
        clientId: { type: integer }
        clientName: { type: string }
        status: { type: string }
        totalAmount: { type: number }
        discountPct: { type: number }
        gstAmount: { type: number }
        grandTotal: { type: number }
        paymentTerms: { type: ["string", "null"] }
        deliveryDate: { type: ["string", "null"] }
        poNumber: { type: ["string", "null"] }
        occasion: { type: ["string", "null"] }
        notes: { type: ["string", "null"] }
        createdAt: { type: string }

    SalesOrderDetail:
      type: object
      required: [id, orderNumber, clientId, clientName, status, totalAmount, discountPct, gstAmount, grandTotal, items, deliveryAddresses, createdAt]
      properties:
        id: { type: integer }
        orderNumber: { type: string }
        clientId: { type: integer }
        clientName: { type: string }
        contactPerson: { type: ["string", "null"] }
        clientEmail: { type: ["string", "null"] }
        clientPhone: { type: ["string", "null"] }
        clientGst: { type: ["string", "null"] }
        billingAddress: { type: ["string", "null"] }
        status: { type: string }
        totalAmount: { type: number }
        discountPct: { type: number }
        gstAmount: { type: number }
        grandTotal: { type: number }
        paymentTerms: { type: ["string", "null"] }
        deliveryDate: { type: ["string", "null"] }
        poNumber: { type: ["string", "null"] }
        occasion: { type: ["string", "null"] }
        notes: { type: ["string", "null"] }
        items: { type: array, items: { $ref: "#/components/schemas/SalesOrderItem" } }
        deliveryAddresses: { type: array, items: { $ref: "#/components/schemas/DeliveryAddress" } }
        createdAt: { type: string }

    SalesOrderInput:
      type: object
      required: [clientId, items]
      properties:
        clientId: { type: integer }
        poNumber: { type: string }
        occasion: { type: string }
        deliveryDate: { type: string }
        paymentTerms: { type: string }
        discountPct: { type: number }
        notes: { type: string }
        items: { type: array, items: { $ref: "#/components/schemas/SalesOrderItemInput" } }
        deliveryAddresses: { type: array, items: { $ref: "#/components/schemas/DeliveryAddressInput" } }

    SalesOrderUpdate:
      type: object
      properties:
        occasion: { type: string }
        notes: { type: string }
        paymentTerms: { type: string }
        deliveryDate: { type: string }
        poNumber: { type: string }

    # ── Purchase Orders ──
    PurchaseOrderItem:
      type: object
      required: [id, productId, productName, quantity, unitPrice]
      properties:
        id: { type: integer }
        productId: { type: integer }
        productName: { type: string }
        quantity: { type: integer }
        unitPrice: { type: number }
        receivedQty: { type: integer }

    PurchaseOrderItemInput:
      type: object
      required: [productId, quantity, unitPrice]
      properties:
        productId: { type: integer }
        quantity: { type: integer }
        unitPrice: { type: number }

    PurchaseOrder:
      type: object
      required: [id, poNumber, vendorId, vendorName, status, totalAmount, createdAt]
      properties:
        id: { type: integer }
        poNumber: { type: string }
        vendorId: { type: integer }
        vendorName: { type: string }
        salesOrderId: { type: ["integer", "null"] }
        status: { type: string }
        totalAmount: { type: number }
        expectedDelivery: { type: ["string", "null"] }
        createdAt: { type: string }

    PurchaseOrderDetail:
      type: object
      required: [id, poNumber, vendorId, vendorName, status, totalAmount, items, createdAt]
      properties:
        id: { type: integer }
        poNumber: { type: string }
        vendorId: { type: integer }
        vendorName: { type: string }
        vendorContactPerson: { type: ["string", "null"] }
        vendorEmail: { type: ["string", "null"] }
        vendorPhone: { type: ["string", "null"] }
        vendorGst: { type: ["string", "null"] }
        vendorAddress: { type: ["string", "null"] }
        vendorCity: { type: ["string", "null"] }
        vendorState: { type: ["string", "null"] }
        vendorPincode: { type: ["string", "null"] }
        vendorPaymentTerms: { type: ["string", "null"] }
        vendorLeadTimeDays: { type: ["integer", "null"] }
        salesOrderId: { type: ["integer", "null"] }
        orderNumber: { type: ["string", "null"] }
        status: { type: string }
        totalAmount: { type: number }
        expectedDelivery: { type: ["string", "null"] }
        items: { type: array, items: { $ref: "#/components/schemas/PurchaseOrderItem" } }
        createdAt: { type: string }
        updatedAt: { type: string }

    PurchaseOrderInput:
      type: object
      required: [vendorId, items]
      properties:
        vendorId: { type: integer }
        salesOrderId: { type: integer }
        expectedDelivery: { type: string }
        items: { type: array, items: { $ref: "#/components/schemas/PurchaseOrderItemInput" } }

    PurchaseOrderUpdate:
      type: object
      properties:
        expectedDelivery: { type: string }

    # ── Inventory ──
    InventoryItem:
      type: object
      required: [productId, productName, stockLevel, lowStockThreshold]
      properties:
        productId: { type: integer }
        productName: { type: string }
        category: { type: string }
        stockLevel: { type: integer }
        lowStockThreshold: { type: integer }
        isLowStock: { type: boolean }

    InventoryMovement:
      type: object
      required: [id, productId, productName, type, quantity, createdAt]
      properties:
        id: { type: integer }
        productId: { type: integer }
        productName: { type: string }
        type: { type: string }
        quantity: { type: integer }
        batch: { type: ["string", "null"] }

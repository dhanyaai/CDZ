        salesOrderId: { type: integer }
        orderNumber: { type: ["string", "null"] }
        status: { type: string }
        totalKits: { type: integer }
        completedKits: { type: integer }
        createdAt: { type: string }

    AssemblyJobDetail:
      type: object
      required: [id, jobNumber, salesOrderId, status, totalKits, completedKits, items, createdAt]
      properties:
        id: { type: integer }
        jobNumber: { type: string }
        salesOrderId: { type: integer }
        orderNumber: { type: ["string", "null"] }
        status: { type: string }
        totalKits: { type: integer }
        completedKits: { type: integer }
        items: { type: array, items: { $ref: "#/components/schemas/AssemblyJobItem" } }
        createdAt: { type: string }

    AssemblyJobInput:
      type: object
      required: [salesOrderId, totalKits]
      properties:
        salesOrderId: { type: integer }
        totalKits: { type: integer }
        notes: { type: string }

    AssemblyJobUpdate:
      type: object
      properties:
        completedKits: { type: integer }
        notes: { type: string }

    # ── Artwork ──
    ArtworkApproval:
      type: object
      required: [id, clientId, clientName, assetName, status, createdAt]
      properties:
        id: { type: integer }
        clientId: { type: integer }
        clientName: { type: string }
        salesOrderId: { type: ["integer", "null"] }
        assetName: { type: string }
        assetUrl: { type: ["string", "null"] }
        status: { type: string }
        notes: { type: ["string", "null"] }
        createdAt: { type: string }

    ArtworkApprovalInput:
      type: object
      required: [clientId, assetName]
      properties:
        clientId: { type: integer }
        salesOrderId: { type: integer }
        assetName: { type: string }
        assetUrl: { type: string }
        notes: { type: string }

